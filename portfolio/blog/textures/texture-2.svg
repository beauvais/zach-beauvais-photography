  <circle cx="200" cy="200" r="195" fill="none" stroke="#6E6860" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="200" r="245" fill="none" stroke="#E8E1D8" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="200" r="300" fill="none" stroke="#E8E1D8" stroke-width="0.8" opacity="0.4"/>
