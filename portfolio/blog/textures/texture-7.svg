<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F4EF"/>
      <stop offset="100%" stop-color="#E8E1D8"/>
    </linearGradient>
  </defs>
  <!-- Soft warm base -->
  <rect width="400" height="400" fill="url(#g7)"/>
  <!-- Large geometric shapes — architectural/abstract -->
  <!-- Triangle (lower left) -->
  <polygon points="0,400 180,400 0,220" fill="#2D2621" opacity="0.08"/>
  <!-- Triangle (upper right) -->
  <polygon points="400,0 220,0 400,180" fill="#6E6860" opacity="0.1"/>
  <!-- Rectangle fragments -->
  <rect x="100" y="100" width="200" height="200" fill="none" stroke="#E89B6D" stroke-width="1.2" opacity="0.4"/>
  <rect x="120" y="120" width="160" height="160" fill="none" stroke="#E89B6D" stroke-width="0.6" opacity="0.25"/>
  <!-- Offset accent rectangle -->
  <rect x="140" y="160" width="120" height="80" fill="#E89B6D" opacity="0.15"/>
  <!-- Cross / plus mark in centre -->
  <line x1="200" y1="160" x2="200" y2="240" stroke="#2D2621" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="200" x2="240" y2="200" stroke="#2D2621" stroke-width="1" opacity="0.3"/>
  <!-- Corner marks -->
  <path d="M30,30 L30,55 M30,30 L55,30" stroke="#6E6860" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M370,30 L370,55 M370,30 L345,30" stroke="#6E6860" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M30,370 L30,345 M30,370 L55,370" stroke="#6E6860" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M370,370 L370,345 M370,370 L345,370" stroke="#6E6860" stroke-width="1.2" fill="none" opacity="0.4"/>
</svg>
