<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFCFB"/>
      <stop offset="100%" stop-color="#F0ECE6"/>
    </linearGradient>
  </defs>
  <!-- Pale base -->
  <rect width="400" height="400" fill="url(#g4)"/>
  <!-- Grid — quiet crosshatch -->
  <g stroke="#2D2621" stroke-width="0.4" opacity="0.08">
    <!-- Horizontals -->
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <!-- Verticals -->
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
  </g>
  <!-- Accent dots at grid intersections — selective -->
  <g fill="#E89B6D" opacity="0.6">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="200" cy="120" r="3"/>
    <circle cx="320" cy="80" r="3"/>
    <circle cx="120" cy="200" r="3"/>
    <circle cx="280" cy="240" r="3"/>
    <circle cx="200" cy="320" r="3"/>
    <circle cx="40" cy="320" r="3"/>
    <circle cx="360" cy="280" r="3"/>
    <circle cx="160" cy="360" r="3"/>
    <circle cx="320" cy="360" r="3"/>
  </g>
  <!-- Bold accent square — off-centre -->
  <rect x="220" y="140" width="80" height="80" fill="#E89B6D" opacity="0.12"/>
  <rect x="220" y="140" width="80" height="80" fill="none" stroke="#E89B6D" stroke-width="1" opacity="0.4"/>
</svg>
