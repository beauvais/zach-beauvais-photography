<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0ECE6"/>
      <stop offset="50%" stop-color="#E8E1D8"/>
      <stop offset="100%" stop-color="#D4C9BB"/>
    </linearGradient>
  </defs>
  <!-- Base warm ground -->
  <rect width="400" height="400" fill="url(#g1)"/>
  <!-- Horizontal scan lines — photographic feel -->
  <g stroke="#2D2621" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="20" x2="400" y2="20"/>
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="220" x2="400" y2="220"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="260" x2="400" y2="260"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="340" x2="400" y2="340"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="0" y1="380" x2="400" y2="380"/>
  </g>
  <!-- Accent horizontal block -->
  <rect x="0" y="180" width="400" height="40" fill="#E89B6D" opacity="0.25"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" fill="#6E6860" opacity="0.06" filter="url(#grain)"/>
</svg>
